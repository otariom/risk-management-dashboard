services:

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app

  collector:
    build: .
    command: python -m src.ingestion.collector
    depends_on:
      - redis
    volumes:
      - .:/app   # 🔥 ADD THIS

  ui:
    build: .
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app   # 🔥 ADD THIS